<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Grid</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="grid">
    <div class="box yellow top-left"></div>
    <div class="box red top-right"></div>

    <div class="box red middle-left"></div>
    <div class="box green right"></div>

    <div class="box yellow small1"></div>
    <div class="box yellow small2"></div>

    <div class="box blue blue-left"></div>
    <div class="box orange orange1"></div>
    <div class="box orange orange2"></div>

    <div class="box teal bottom-left"></div>
    <div class="box blue bottom-right"></div>
</div>

</body>
</html>
